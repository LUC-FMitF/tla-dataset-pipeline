name: Lint and Format

on:
  push:
    branches:
      - main
      - develop
      - '**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ruff-lint:
    runs-on: ubuntu-latest
    name: Ruff Linting
    steps:
      - uses: actions/checkout@v4.1.7
      - uses: astral-sh/ruff-action@v1
        with:
          args: 'check src/'

  black-format:
    runs-on: ubuntu-latest
    name: Black Formatting
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4.1.7
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install black[colorama]==24.1.1
      - run: black src/
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'style: apply black formatting'
          file_pattern: 'src/**/*.py'

  mypy-type-check:
    runs-on: ubuntu-latest
    name: MyPy Type Checking
    steps:
      - uses: actions/checkout@v4.1.7
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - run: pip install -e .[dev,s3]
      - run: mypy src/tladata
