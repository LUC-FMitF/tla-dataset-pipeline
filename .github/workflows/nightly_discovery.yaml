name: Nightly Data Pipeline

on:
  schedule:
    # Run every night at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  pipeline:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[s3]"
          pip install dvc[s3]

      - name: Configure DVC
        env:
          S3_BUCKET: ${{ vars.S3_BUCKET }}
        run: |
          cat > .dvc/config.local << EOF
          [core]
              remote = s3remote
          ['remote "s3remote"']
              url = s3://${S3_BUCKET}/dvc/
              region = us-east-2
          EOF
          echo "DVC config.local created:"
          cat .dvc/config.local

      - name: Run DVC pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          S3_BUCKET: ${{ vars.S3_BUCKET }}
        run: |
          echo "Starting DVC pipeline..."
          set -x  # Enable debug output
          dvc repro discover pull --verbose
        continue-on-error: true

      - name: Push outputs to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          echo "Pushing outputs to S3..."
          dvc push --verbose

      - name: Commit DVC state to repository
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # Add and commit dvc.lock and DVC metadata
          git add dvc.lock
          git commit -m "chore: update DVC state after discovery pipeline" || echo "No changes to commit"
          
          # Push to repository
          git push origin HEAD:$(git rev-parse --abbrev-ref HEAD)

      - name: Check pipeline status
        if: failure()
        run: |
          echo "Pipeline failed. Collecting diagnostic information..."
          echo "\n=== DVC Status ==="
          dvc status || true
          echo "\n=== DVC Lock File ==="
          cat dvc.lock || echo "dvc.lock not found"
          echo "\n=== Check for hanging processes ==="
          ps aux | grep -E "tladata|dvc" || true
          echo "\n=== Disk space ==="
          df -h
          echo "\n=== Current working directory ==="
          pwd && ls -la
          exit 1

      - name: Log pipeline results
        if: success()
        run: |
          echo "Pipeline execution completed successfully!"
          echo "Stages run: discover -> pull"
          echo "Outputs pushed to S3 remote"
          echo "Manifest: manifests/sources/sources_latest.jsonl"
          echo "Extracted files: data/raw/"
          echo "S3 bucket: ${{ vars.S3_BUCKET }}"
