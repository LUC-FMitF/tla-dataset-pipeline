name: Nightly Data Pipeline

on:
  schedule:
    # Run every night at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[s3]"
          pip install dvc

      - name: Configure DVC
        env:
          S3_BUCKET: ${{ vars.S3_BUCKET }}
        run: |
          cat > .dvc/config.local << EOF
          [core]
              remote = s3remote
          ['remote "s3remote"']
              url = s3://${S3_BUCKET}/dvc/
              region = us-east-2
          EOF
          echo "DVC config.local created:"
          cat .dvc/config.local

      - name: Verify AWS credentials
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          echo "Checking AWS credentials..."
          if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SECRET_ACCESS_KEY" ]; then
            echo "ERROR: AWS credentials not set in GitHub secrets"
            echo "Required secrets: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY"
            exit 1
          fi
          echo "AWS credentials are set"
          
          # Verify credentials are valid using AWS CLI
          if aws sts get-caller-identity --region us-east-2 > /tmp/aws_identity.json 2>&1; then
            echo "AWS credentials valid"
          else
            echo "AWS credentials invalid or expired"
            exit 1
          fi

      - name: Verify S3 bucket access
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          echo "Checking S3 bucket access..."
          if aws s3 ls s3://luc-tla-datasets --region us-east-2 > /dev/null 2>&1; then
            echo "AWS S3 bucket is accessible"
          else
            echo "Cannot access S3 bucket"
            exit 1
          fi

      - name: Run DVC pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          S3_BUCKET: ${{ vars.S3_BUCKET }}
        run: |
          echo "Starting DVC pipeline..."
          set -x  # Enable debug output
          dvc repro --verbose
        continue-on-error: true

      - name: Check pipeline status
        if: failure()
        run: |
          echo "Pipeline failed. Collecting diagnostic information..."
          echo "\n=== DVC Status ==="
          dvc status || true
          echo "\n=== DVC Lock File ==="
          cat dvc.lock || echo "dvc.lock not found"
          echo "\n=== Check for hanging processes ==="
          ps aux | grep -E "tladata|dvc" || true
          echo "\n=== Disk space ==="
          df -h
          echo "\n=== Current working directory ==="
          pwd && ls -la
          exit 1

      - name: Log pipeline results
        if: success()
        run: |
          echo "Pipeline execution completed successfully!"
          echo "Stages run: discover -> pull -> push-to-s3"
          echo "Manifest: manifests/sources/sources_latest.jsonl"
          echo "Extracted files: data/raw/"
          echo "S3 bucket: luc-tla-datasets"
